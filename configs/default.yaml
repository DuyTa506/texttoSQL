# =============================================================================
# Text-to-SQL Baseline Configuration
# =============================================================================

# --- Data Pipeline ---
data:
  dataset_path: "./data/spider"          # Path to downloaded dataset
  adapter: "spider_v1"                    # spider_v1 | spider_v2 | multispider
  processed_dir: "./data/processed"       # Processed data output
  train_split: "train"
  dev_split: "dev"

# --- Schema Chunking ---
chunking:
  chunk_types:
    - table
    - column
    - foreign_key
    - value
  max_sample_values: 5                    # Max sample values per column

# --- Embedding & Indexing ---
indexing:
  embedding_model: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  chroma_persist_dir: "./data/chroma_db"
  collection_name: "schema_chunks"
  batch_size: 128

# --- Retrieval ---
retrieval:
  bm25_top_k: 30
  semantic_top_k: 30
  rrf_k: 60                               # RRF fusion constant
  final_top_k: 15                          # Final filtered schema elements
  bidirectional:
    enable_fk_expansion: true
    max_expansion_depth: 1                 # How many FK hops

# --- Query Augmentation ---
augmentation:
  enable: true
  strategy: "keyword"                      # keyword | value | decompose

# --- NPMI Schema Linking ---
npmi:
  enable: false                            # Set true after building matrix
  matrix_path: "./data/npmi_matrix.json"   # Pre-built NPMI co-occurrence matrix
  min_count: 3                             # Min co-occurrence for valid NPMI
  top_k: 30                                # NPMI candidates before RRF fusion

# =============================================================================
# Schema Knowledge Graph  (disabled by default — build graph offline first)
# =============================================================================
schema_graph:
  enabled: false                           # Set true to use GraphRetriever
  graph_path: "./data/schema_graphs/spider_enriched.json"
  # Node embeddings: stored in ChromaDB (recommended) or in-node JSON fallback
  node_collection: "schema_graph_nodes"   # ChromaDB collection name for node embeddings
  # (chroma_persist_dir is shared from indexing.chroma_persist_dir)
  # PPR retrieval parameters
  top_m: 5                                 # PPR seed nodes (top cosine matches)
  alpha: 0.7                              # PPR damping factor (higher = closer to seeds)
  score_threshold: 0.05                   # Min PPR score to include a node
  max_nodes: 20                           # Hard cap on returned nodes per query
  synonym_boost: 0.3                      # Extra score for synonym token match
  # Hybrid mode: merge GraphRetriever + HybridRetriever results via RRF
  hybrid: false                            # Set true to fuse both retrievers

# =============================================================================
# Phase 1: Pre-Retrieval  (all disabled by default — enable for ablation)
# =============================================================================
pre_retrieval:
  # Value Scanner: scan DB cell values to match NL mentions
  value_scan:
    enabled: false                         # Set true to activate
    max_values: 500                        # Max DISTINCT values per column to scan
    top_k: 5                              # Max ValueMatch results per question
    min_score: 0.75                        # Fuzzy match threshold [0, 1]

  # Question Decomposer: split complex questions into sub-questions
  decomposition:
    enabled: false                         # Set true to activate
    complexity_threshold: 0.6             # Min complexity score before splitting
    min_token_count: 12                   # Min tokens before attempting decomposition

# =============================================================================
# Phase 3: Generation
# =============================================================================
generation:
  # ── Provider ────────────────────────────────────────────────────────────────
  # "local"  → loads a HuggingFace / Unsloth checkpoint from model_path
  #            requires GPU; set model_path to your SFT/RL checkpoint
  # "openai" → calls OpenAI Chat Completions API (no GPU needed)
  #            set model_path to the model name, e.g. "gpt-4o-mini"
  #            set api_key or export OPENAI_API_KEY=<your-key>
  provider: local                         # local | openai
  model_path: ""                          # checkpoint path (local) or model name (openai)

  # ── OpenAI-specific ─────────────────────────────────────────────────────────
  api_key: ""                             # leave empty to read from OPENAI_API_KEY env var
  api_base_url: ""                        # custom base URL for OpenAI-compatible endpoints
                                          # e.g. Azure, Together.ai, Groq, local vLLM

  # ── Generation parameters ───────────────────────────────────────────────────
  mode: standard                          # standard | cot_plan | divide_conquer
  n_candidates: 1                         # >1 triggers multi-candidate + selector
  temperature: 0.0                        # 0.0 = greedy (deterministic)
  candidate_temperature: 0.8             # temperature for candidate diversity
  max_new_tokens: 512

# =============================================================================
# Phase 4: Post-Generation  (all disabled by default — enable for ablation)
# =============================================================================
post_generation:
  # Retry execution loop: run SQL → classify error → re-prompt → repeat
  retry_loop:
    enabled: false                         # Set true to activate
    max_retries: 3

  # Multi-candidate selection (used when generation.n_candidates > 1)
  candidates:
    n: 1                                   # Mirror of generation.n_candidates
    strategy: execution_consistency        # execution_consistency

# --- SLM Training (Unsloth) ---
# Training config lives in training/config.py (dataclasses)
# Below are the YAML overrides
training:
  # LoRA config (applied to both SFT and RL)
  lora:
    r: 16                                  # rank: 8 (fast) → 128 (complex)
    lora_alpha: 32                         # alpha = 2 * r (Unsloth recommendation)
    lora_dropout: 0                        # 0 for Unsloth optimized perf
    use_gradient_checkpointing: "unsloth"  # 30% less VRAM
    use_rslora: false

  # Stage 1: SFT
  sft:
    base_model: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
    output_dir: "./checkpoints/sft"
    load_in_4bit: false                    # LoRA mode (not QLoRA)
    learning_rate: 2.0e-4
    batch_size: 4
    gradient_accumulation_steps: 8
    num_epochs: 3
    max_seq_length: 2048
    train_on_completions_only: true        # Unsloth best practice
    # Data source: "omnisql" | "spider" | "custom"
    data_source: "custom"
    # OmniSQL multi-dataset paths (used when data_source == "omnisql")
    omnisql_data_paths:
      - "./data/train_synsql.json"
      - "./data/train_spider.json"
      - "./data/train_bird.json"
    omnisql_max_samples:
      train_synsql.json: 200000            # Subsample SynSQL-2.5M

  # Stage 2: RL Reasoning Boost
  rl:
    algorithm: "grpo"                      # grpo | dpo
    output_dir: "./checkpoints/rl"
    learning_rate: 5.0e-6
    num_epochs: 1
    kl_coeff: 0.05
    grpo:
      num_samples: 8
      temperature: 0.7
    dpo:
      beta: 0.1
    reward:
      execution_accuracy: 0.5
      format_check: 0.2
      schema_faithfulness: 0.15
      reasoning_quality: 0.15
    # Correction multitask (Stage 2 extension)
    correction_data_path: ""               # Path to mined correction JSONL
    correction_mix_ratio: 0.2             # Fraction of correction samples per batch

# --- Evaluation ---
evaluation:
  metrics:
    - execution_accuracy
    - exact_match
    - schema_recall
    - schema_precision
  db_dir: "./data/spider/database"         # Path to SQLite databases
  output_dir: "./results"
